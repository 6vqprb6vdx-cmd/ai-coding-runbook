name: refresh-raw

# Cron: every Monday 09:00 HKT = 01:00 UTC
# Plus manual trigger from GitHub UI / `gh workflow run refresh-raw`.
on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so commit log diff works

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Configure git for bot commits
        run: |
          git config user.name "claude-code-wiki-bot"
          git config user.email "claude-code-wiki-bot@users.noreply.github.com"

      - name: Refresh raw
        run: python3 scripts/refresh_raw.py

      - name: Generate changelog if anything changed
        id: changelog
        run: |
          if [ -z "$(git status --porcelain 01_Raw/)" ]; then
            echo "no changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p 03_Output/Changelog
          OUT="03_Output/Changelog/${DATE}.md"
          {
            echo "# Raw Refresh — ${DATE}"
            echo
            echo "Generated by GHA \`refresh-raw\` workflow."
            echo
            echo "## Files changed"
            echo
            echo '```'
            git status --short 01_Raw/ | head -200
            echo '```'
            echo
            echo "Full diff visible in the commit pushed by this workflow."
          } > "$OUT"
          git add 03_Output/Changelog/

      - name: Commit and push changes
        if: steps.changelog.outputs.changed == 'true'
        run: |
          git add 01_Raw/
          git commit -m "raw: weekly refresh $(date -u +%Y-%m-%d)"
          git push
